receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:55679

exporters:
  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"
  otlphttp:
    endpoint: "http://jaeger:4317/api/traces"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [zipkin]
